<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Chữ Cái ABC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>BẢNG CHỮ CÁI</h1>

        <a href="https://drive.google.com/file/d/1WzcqoEnkLBRWp2ui4BG4HmvnM939iS9F/view?usp=sharing" target="_blank" class="download-btn">
            <i class="fa-solid fa-download"></i> Tải Ứng Dụng Cho Điện Thoại (File .APK)
        </a>

        <div class="language-selector">
            <label for="langSelect"><b>Chọn Ngôn Ngữ Đọc:</b></label>
            <select id="langSelect">
                <option value="vi" selected>Tiếng Việt (Giọng Nữ Đánh Vần)</option>
                <option value="en">Tiếng Anh (English Female)</option>
            </select>
        </div>

        <div class="grid-container">
            <button onclick="phatAm('A')">A</button>
            <button onclick="phatAm('Ă')">Ă</button>
            <button onclick="phatAm('Â')">Â</button>
            <button onclick="phatAm('B')">B</button>
            <button onclick="phatAm('C')">C</button>
            <button onclick="phatAm('D')">D</button>
            <button onclick="phatAm('Đ')">Đ</button>
            <button onclick="phatAm('E')">E</button>
            <button onclick="phatAm('Ê')">Ê</button>
            <button onclick="phatAm('G')">G</button>
            <button onclick="phatAm('H')">H</button>
            <button onclick="phatAm('I')">I</button>
            <button onclick="phatAm('K')">K</button>
            <button onclick="phatAm('L')">L</button>
            <button onclick="phatAm('M')">M</button>
            <button onclick="phatAm('N')">N</button>
            <button onclick="phatAm('O')">O</button>
            <button onclick="phatAm('Ô')">Ô</button>
            <button onclick="phatAm('Ơ')">Ơ</button>
            <button onclick="phatAm('P')">P</button>
            <button onclick="phatAm('Q')">Q</button>
            <button onclick="phatAm('R')">R</button>
            <button onclick="phatAm('S')">S</button>
            <button onclick="phatAm('T')">T</button>
            <button onclick="phatAm('U')">U</button>
            <button onclick="phatAm('Ư')">Ư</button>
            <button onclick="phatAm('V')">V</button>
            <button onclick="phatAm('X')">X</button>
            <button onclick="phatAm('Y')">Y</button>
        </div>
    </div>

<script>
    // 1. Bản đồ phát âm Tiếng Việt (Đánh vần chuẩn mẫu giáo)
    const phienAmTiengViet = {
        'A': 'a', 'Ă': 'á', 'Â': 'ớ', 'B': 'bờ', 'C': 'cờ', 'D': 'dờ', 'Đ': 'đờ',
        'E': 'e', 'Ê': 'ê', 'G': 'gờ', 'H': 'hờ', 'I': 'i', 'K': 'ca', 'L': 'lờ',
        'M': 'mờ', 'N': 'nờ', 'O': 'o', 'Ô': 'ô', 'Ơ': 'ơ', 'P': 'pờ', 'Q': 'quờ',
        'R': 'rờ', 'S': 'sờ', 'T': 'tờ', 'U': 'u', 'Ư': 'ư', 'V': 'vờ', 'X': 'xờ', 'Y': 'i dài'
    };

    // 2. Bản đồ phát âm Tiếng Anh (Đánh vần chữ cái đơn)
    const phienAmTiengAnh = {
        'A': 'ay', 'Ă': 'ay', 'Â': 'ay', 'B': 'bee', 'C': 'see', 'D': 'dee', 'Đ': 'dee',
        'E': 'ee', 'Ê': 'ee', 'G': 'jee', 'H': 'aitch', 'I': 'eye', 'K': 'kay', 'L': 'el',
        'M': 'em', 'N': 'en', 'O': 'oh', 'Ô': 'oh', 'Ơ': 'er', 'P': 'pee', 'Q': 'cue',
        'R': 'ar', 'S': 'ess', 'T': 'tee', 'U': 'you', 'Ư': 'you', 'V': 'vee', 'X': 'ex', 'Y': 'why'
    };

    // Nạp sẵn giọng nói hệ thống để giảm thiểu độ trễ
    let danhSachGiongNoi = [];
    function loadVoices() {
        if (typeof speechSynthesis !== 'undefined') {
            danhSachGiongNoi = window.speechSynthesis.getVoices();
        }
    }
    loadVoices();
    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    function phatAm(chuCai) {
        const ngonNgu = document.getElementById('langSelect').value;
        let textDoc = "";
        let langCode = ""; 
        let targetLang = ""; 

        if (ngonNgu === 'vi') {
            textDoc = phienAmTiengViet[chuCai] || chuCai;
            langCode = "vi";
            targetLang = "vi-VN";
        } else {
            textDoc = phienAmTiengAnh[chuCai] || chuCai;
            langCode = "en";
            targetLang = "en-US";
        }

        // Tắt các giọng đang phát dở tránh đè âm thanh
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }

        // --- ƯU TIÊN PHƯƠNG ÁN 1: Sử dụng giọng đọc nữ hệ thống (SpeechSynthesis) cực chuẩn ---
        if (window.speechSynthesis) {
            let speech = new SpeechSynthesisUtterance();
            speech.text = textDoc;
            speech.lang = targetLang;
            speech.rate = 0.85; // Tốc độ chậm, rõ ràng cho bé dễ nghe

            if (danhSachGiongNoi.length === 0) {
                loadVoices();
            }

            let chosenVoice = null;

            if (ngonNgu === 'vi') {
                // Lọc kỹ các giọng NỮ tiếng Việt (Hoài An, An, Linh, Lan, Hương, Lê, Mai...)
                chosenVoice = danhSachGiongNoi.find(voice => {
                    const name = voice.name.toLowerCase();
                    return (voice.lang.includes('vi') || voice.lang.includes('VN')) && 
                           (name.includes('hoài an') || name.includes('an') || name.includes('linh') || name.includes('lan') || name.includes('female') || name.includes('woman') || name.includes('hương') || name.includes('mai'));
                });
                
                // Dự phòng: Nếu không có giọng nữ cụ thể, lấy giọng Việt bất kỳ có sẵn
                if (!chosenVoice) {
                    chosenVoice = danhSachGiongNoi.find(voice => voice.lang.includes('vi') || voice.lang.includes('VN'));
                }
            } else {
                // Lọc tìm giọng NỮ tiếng Anh (Zira, Samantha, Karen, Hazel, Susan, Google US English...)
                chosenVoice = danhSachGiongNoi.find(voice => {
                    const name = voice.name.toLowerCase();
                    return (voice.lang.toLowerCase().includes('en')) && 
                           (name.includes('zira') || name.includes('samantha') || name.includes('karen') || name.includes('female') || name.includes('woman') || name.includes('google us english') || name.includes('hazel') || name.includes('susan'));
                });

                // Dự phòng: Lấy giọng Anh bất kỳ
                if (!chosenVoice) {
                    chosenVoice = danhSachGiongNoi.find(voice => voice.lang.toLowerCase().includes('en'));
                }
            }

            // Thực hiện phát âm nếu tìm thấy giọng thích hợp
            if (chosenVoice) {
                speech.voice = chosenVoice;
                window.speechSynthesis.speak(speech);
                console.log("Đang đọc giọng nữ hệ thống: " + chosenVoice.name);
                return; // Kết thúc hàm
            }
        }

        // --- PHƯƠNG ÁN 2 (DỰ PHÒNG): Nếu trình duyệt không hỗ trợ, dùng API Google TTS trực tuyến (Giọng nữ mặc định) ---
        console.log("Không tìm thấy giọng nói local phù hợp, chuyển sang Google TTS...");
        let audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(textDoc)}`;
        let audio = new Audio(audioUrl);
        audio.play().catch(err => console.log("Không thể phát âm thanh trực tuyến."));
    }
</script>
</body>
</html>
